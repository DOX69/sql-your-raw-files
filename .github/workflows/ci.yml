name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install DuckDB
      run: |
        wget https://github.com/duckdb/duckdb/releases/download/v1.1.3/duckdb_cli-linux-amd64.zip
        unzip -o duckdb_cli-linux-amd64.zip -d /tmp/
        sudo mv /tmp/duckdb /usr/local/bin/
        duckdb --version

    - name: Run tests
      run: |
        chmod +x scripts/db-manager.sh scripts/test_db-manager.sh
        ./scripts/test_db-manager.sh
